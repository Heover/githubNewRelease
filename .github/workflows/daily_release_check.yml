name: GitHub Release 每日监控

on:
  schedule:
    # 每天北京时间 00:07 (UTC+8) => UTC 16:07
    - cron: "7 16 * * *"
  workflow_dispatch:  # 允许手动触发
  push:
    paths:
      - "scripts/check_releases.mjs"
      - ".github/workflows/daily_release_check.yml"
      - "last_check.txt"

jobs:
  check-releases:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 扫描新 Release 并通知
        env:
          MONITOR_USER: ${{ vars.MONITOR_USER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_UID: ${{ secrets.SERVER_UID }}
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/check_releases.mjs

      - name: 提交检查时间
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_check.txt
          git diff --staged --quiet || git commit -m "chore: 更新检查时间"
          git push
